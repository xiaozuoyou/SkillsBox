# Build macOS (Apple Silicon) + publish GitHub Release with updater artifacts.
# Trigger: push a version tag, e.g. git tag v0.1.1 && git push origin v0.1.1
#
# Required secret:
#   TAURI_SIGNING_PRIVATE_KEY  — contents of the updater private key
# Optional:
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#
# See docs/UPDATES.md

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      # Action majors that run on Node 24 (Node 20 is deprecated on GHA runners).
      - name: Checkout
        uses: actions/checkout@v5

      # Do not set "version" here — package.json "packageManager" is pnpm@10.26.1.
      # Specifying both causes ERR_PNPM_BAD_PM_VERSION (Multiple versions of pnpm).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release (macOS aarch64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: SkillsBox ${{ github.ref_name }}
          releaseBody: |
            ## SkillsBox ${{ github.ref_name }}

            macOS (Apple Silicon) build with in-app auto-update artifacts.

            1. Download the `.dmg` or app archive from **Assets**, or
            2. Use **Settings → About → Check for updates** in an existing install.
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
